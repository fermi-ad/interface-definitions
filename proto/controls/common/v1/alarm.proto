// Defines the structure for the status of an ACORN generic alarm

syntax = "proto3";

import "google/protobuf/timestamp.proto";

package common.alarm;

message Status {
    string device = 1;                      //  required

    enum Source {
        SOURCE_UNKNOWN      = 0;
        SOURCE_ANALOG       = 1;
        SOURCE_DIGITAL      = 2;
        SOURCE_EPICS        = 3;
    }
    Source source = 2;                      //  required

    enum State {
        STATE_UNKNOWN       = 0;
        STATE_OK            = 1;
        STATE_ALARMED       = 2;
        STATE_BYPASSED      = 3;
        STATE_LATCHED       = 4;
        STATE_ACKNOWLEDGED  = 5;
    }
    State state = 3;                        //  required

    enum Severity {
        SEVERITY_UNKNOWN    = 0;
        SEVERITY_OK         = 1
        SEVERITY_LOW        = 2;
        SEVERITY_HIGH       = 3;
    }
    Severity severity = 4;                  //  required

    bool acknowledgeable = 5;               //  required

    // The time the current state was set.
    google.protobuf.Timestamp time = 6;     //  required

    // The meaning of the detail field depends on the source field:
    //    SOURCE_ANALOG  - detail is ignored
    //    SOURCE_DIGITAL - detail is a bitfield indicating which digital alarm bits are in alarm,
    //                     note that 1 indicates alarm and 0 indicates ok, this may not be the same
    //                     as the value of the corresponding nominal bit,
    //                     literally: detail = (value XOR nominal) AND mask
    //    SOURCE_EPICS   - detail is one of the EPICS alarm status enumeration values per
    //                     https://docs.epics-controls.org/projects/base/en/r7.0.9/menuAlarmStat.html
    uint32 detail = 7;

    // Filled when the current status state was set by a user. Contains the username
    // of the user who made the change
    string user = 8;

    // Indicates when an alarm is scheduled to come back into active status from bypass
    google.protobuf.Timestamp wake = 9;
}
